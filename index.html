    <script>
      const homeTab = document.getElementById("home-tab");
      const shortsTab = document.getElementById("shorts-tab");
      const subscriptionsTab = document.getElementById("subscriptions-tab");
      const youTab = document.getElementById("you-tab");

      const homeBtn = document.querySelector(".side-menu-btn.home");
      const shortsBtn = document.querySelector(".side-menu-btn.shorts");
      const subscriptionsBtn = document.querySelector(
        ".side-menu-btn.subscriptions",
      );
      const youBtn = document.querySelector(".side-menu-btn.you");

      function hideAllTabs() {
        homeTab.style.display = "none";
        shortsTab.style.display = "none";
        subscriptionsTab.style.display = "none";
        youTab.style.display = "none";
      }

      homeBtn.addEventListener("click", () => {
        hideAllTabs();
        homeTab.style.display = "block";
        fetchTabContent("home", "#home-tab .video-grid", false);
      });

      shortsBtn.addEventListener("click", () => {
        hideAllTabs();
        shortsTab.style.display = "block";
        fetchTabContent("shorts", ".shorts-scroll", true);
      });

      subscriptionsBtn.addEventListener("click", () => {
        hideAllTabs();
        subscriptionsTab.style.display = "block";
        fetchTabContent(
          "subscriptions",
          "#subscriptions-tab .video-grid",
          false,
        );
      });

      youBtn.addEventListener("click", () => {
        hideAllTabs();
        youTab.style.display = "block";
        fetchTabContent("library", "#you-tab .video-grid", false);
      });

      // Set default tab to home
      hideAllTabs();
      homeTab.style.display = "block";
      fetchTabContent("home", "#home-tab .video-grid", false);

      // --- NEW ASYNC LOADING LOGIC ---

      async function fetchTabContent(endpoint, containerSelector, isShort) {
        const container = document.querySelector(containerSelector);
        if (!container) return;

        // 1. Show original skeletons first
        renderSkeletons(container, isShort);

        try {
          // 2. Fetch data from the Express Mock Route which contains mock data
          const response = await fetch(
            `http://localhost:3000/api/mock/${endpoint}`,
          );
          const data = await response.json();

          // 3. Wait 1 seconds
          setTimeout(() => {
            container.innerHTML = ""; // Clear skeletons

            data.forEach((video) => {
              const div = document.createElement("div");

              if (!isShort) {
                div.classList.add("video-card");
                div.innerHTML = `
                <div class="thumbnail">
                   <img src="${video.thumbnail}" alt="${video.title}" style="width:100%; border-radius:12px;">
                </div>
                <div class="video-info">
                  <div class="channel-avatar" style="background-image: url('${video.avatar}'); background-size: cover;"></div>
                  <div class="video-text">
                    <h4>${video.title}</h4>
                    <p>${video.channel}</p>
                    <p>${video.views} • ${video.uploaded || "Just now"}</p>
                  </div>
                </div>`;

                div.addEventListener("click", () => {
                  window.location.href = `./pages/watch.html?v=${video.id}`;
                });
              } else {
                div.classList.add("short");
                div.innerHTML = `
              <div class="short-video" style="background-image: url('${video.thumbnail}'); background-size: cover;"></div>
              <div class="short-ui">
                <div class="short-info">
                  <p class="short-title">${video.title}</p>
                  <p class="short-channel">${video.channel}</p>
                </div>
                <div class="short-actions">
                  <button class="action"></button>
                  <button class="action"></button>
                  <button class="action"></button>
                  <button class="action"></button>
                </div>
              </div>`;
              }
              container.appendChild(div);
            });
          }, 1000);
        } catch (err) {
          console.error("Failed to fetch data:", err);
        }
      }

      // Helper to draw the skeletons based on the type of content (shorts vs regular videos)
      function renderSkeletons(container, isShort) {
        container.innerHTML = "";
        const count = isShort ? 5 : 25;
        for (let i = 0; i < count; i++) {
          const skeleton = document.createElement("div");
          skeleton.classList.add(isShort ? "short" : "video-card");
          skeleton.innerHTML = isShort
            ? `
         <div class="short-video skeleton"></div>
         <div class="short-ui">
           <div class="short-info skeleton-text">
             <p class="short-title"></p>
             <p class="short-channel"></p>
           </div>
           <div class="short-actions">
             <button class="action skeleton-circle"></button>
             <button class="action skeleton-circle"></button>
             <button class="action skeleton-circle"></button>
             <button class="action skeleton-circle"></button>
           </div>
         </div>`
            : `
         <div class="thumbnail video-skeleton"></div>
         <div class="video-info">
           <div class="channel-avatar"></div>
           <div class="video-text">
             <h4></h4>
             <p></p>
             <p></p>
           </div>
         </div>`;
          container.appendChild(skeleton);
        }
      }

      // Side-popup script
      const navMenuBtn = document.querySelector(".nav-menu");
      const sidePopup = document.querySelector(".side-popup");

      navMenuBtn.addEventListener("click", () => {
        sidePopup.classList.add("open");
      });

      // close the popup when clicking outside of it or on the close button
      sidePopup.addEventListener("click", (e) => {
        if (
          e.target.classList.contains("side-popup") ||
          e.target.classList.contains("close-btn")
        ) {
          sidePopup.classList.remove("open");
        }
      });

      
      //Tab switching logic for side-menu-btn in the popup nav
      const popupHomeBtn = document.querySelector(".popup-home");
      const popupShortsBtn = document.querySelector(".popup-shorts");
      const popupSubscriptionsBtn = document.querySelector(
        ".popup-subscriptions",
      );
      const popupYouBtn = document.querySelector(".popup-you");

      popupHomeBtn.addEventListener("click", () => {
        hideAllTabs();
        homeTab.style.display = "block";
        fetchTabContent("home", "#home-tab .video-grid", false);
        sidePopup.classList.remove("open");
      });

      popupShortsBtn.addEventListener("click", () => {
        hideAllTabs();
        shortsTab.style.display = "block";
        fetchTabContent("shorts", ".shorts-scroll", true);
        sidePopup.classList.remove("open");
      });

      popupSubscriptionsBtn.addEventListener("click", () => {
        hideAllTabs();
        subscriptionsTab.style.display = "block";
        fetchTabContent(
          "subscriptions",
          "#subscriptions-tab .video-grid",
          false,
        );
        sidePopup.classList.remove("open");
      });

      popupYouBtn.addEventListener("click", () => {
        hideAllTabs();
        youTab.style.display = "block";
        fetchTabContent("library", "#you-tab .video-grid", false);
        sidePopup.classList.remove("open");
      });
